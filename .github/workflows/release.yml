name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare:
    # 릴리즈 body의 랜덤 후미 문구를 한 번만 뽑아 두 OS 잡에 공유.
    # 문구 목록은 아래 SUFFIXES 배열에서 자유롭게 추가/삭제.
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.pick.outputs.suffix }}
    steps:
      - name: Pick random release-body suffix
        id: pick
        shell: bash
        run: |
          SUFFIXES=(
            "오후 반차를 사용했습니다"
            "여자친구를 만나러가는 중입니다"
            "아아를 마셨습니다"
            "등갈비김치찜을 먹는 중입니다"
            "파스타를 만드는 중입니다"
          )
          IDX=$((RANDOM % ${#SUFFIXES[@]}))
          PICK="${SUFFIXES[$IDX]}"
          echo "suffix=$PICK" >> "$GITHUB_OUTPUT"
          echo "Picked: $PICK"

  release:
    needs: prepare
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: rust-std 'universal-apple-darwin'은 단일 채널로 미배포
          # → aarch64 + x86_64 두 native target을 설치 후 lipo combine은 tauri-action이 처리
          - os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 모하심 v1.0.5 — 업데이트 플로우 + 잔디 자랑하기 리디자인

            ### 🔔 업데이트 알림 흐름
            - 새 버전이 있으면 메인 헤더에 **다운로드 아이콘**이 표시되고, 클릭하면 설정 → 앱 업데이트 상세로 바로 이동합니다.
            - 새 버전으로 첫 실행하면 **"이번 버전에서 달라진 점"** 모달이 자동 노출되어 무엇이 바뀌었는지 한눈에 확인할 수 있습니다.
            - **트레이 아이콘 우클릭에 "재시작"** 항목 추가, 설정 화면 하단의 재시작 버튼은 제거되어 위치가 정리되었습니다.

            ### 🌱 잔디 자랑하기 카드 리디자인
            - **세로형 카드(864×1164)** 로 비율 변경, 외부 여백을 없애서 카드 모양 그대로 PNG가 클립보드에 복사됩니다.
            - 카드 중앙에 **모하 캐릭터 워터마크**(장착 아이템 반영)로 personal한 느낌을 추가했습니다.
            - **요일 헤더(일~토)** 와 잔디맵 우측 하단 **"적음→많음" 5단계 범례**로 캘린더 가독성을 높였습니다.
            - 업적은 **좌우 분할**(🏆 가장 집중한 날 · ✅ 할일 많이 한 날)로 라벨 + 메인 두 줄 형식, 자랑 한마디는 **"💬 내 자랑 한마디"** 라벨과 56pt 강조 텍스트로 변경.

            ### 🎨 태그 편집 개편
            - **`emoji-mart`** 도입으로 검색 + 한국어 + 카테고리 네비를 갖춘 풍부한 이모지 선택기를 제공합니다.
            - 이모지/색상 picker가 분리된 두 pill 버튼으로 토글되어 인터랙션이 명확해졌습니다.
            - **색상 팔레트 16색 파스텔 톤** (소프트 블루 · 라일락 · 민트 · 세이지 · 머스타드 · 라벤더 …) 으로 확장.
            - 뒤로가기 버튼 SVG 화살표 스타일로 통일.

            ### 🥔 상점
            - 모자 가격 조정: **40 · 55 · 70 새싹**.
            - 목도리 가격 조정: **80 · 100 · 120 새싹**.
            - 아이템 이름 변경: "멋쟁이 선글라스" → **"멋쟁이 하늘색 안경"**, "빨간 히어로 목도리" → **"어두운 밤하늘 목도리"**.

            ### 🪟 인스톨러 화질
            - NSIS 헤더/사이드바 BMP supersample을 4×→8× 으로 강화하여 작은 사이즈에서도 라인이 매끄럽게 보존됩니다.

            위 내용을 수정하였고 ${{ needs.prepare.outputs.suffix }}.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 모하심 v1.0.5 — 업데이트 플로우 + 잔디 자랑하기 리디자인

            ### 🔔 업데이트 알림 흐름
            - 새 버전이 있으면 메인 헤더에 **다운로드 아이콘**이 표시되고, 클릭하면 설정 → 앱 업데이트 상세로 바로 이동합니다.
            - 새 버전으로 첫 실행하면 **"이번 버전에서 달라진 점"** 모달이 자동 노출되어 무엇이 바뀌었는지 한눈에 확인할 수 있습니다.
            - **트레이 아이콘 우클릭에 "재시작"** 항목 추가, 설정 화면 하단의 재시작 버튼은 제거되어 위치가 정리되었습니다.

            ### 🌱 잔디 자랑하기 카드 리디자인
            - **세로형 카드(864×1164)** 로 비율 변경, 외부 여백을 없애서 카드 모양 그대로 PNG가 클립보드에 복사됩니다.
            - 카드 중앙에 **모하 캐릭터 워터마크**(장착 아이템 반영)로 personal한 느낌을 추가했습니다.
            - **요일 헤더(일~토)** 와 잔디맵 우측 하단 **"적음→많음" 5단계 범례**로 캘린더 가독성을 높였습니다.
            - 업적은 **좌우 분할**(🏆 가장 집중한 날 · ✅ 할일 많이 한 날)로 라벨 + 메인 두 줄 형식, 자랑 한마디는 **"💬 내 자랑 한마디"** 라벨과 56pt 강조 텍스트로 변경.

            ### 🎨 태그 편집 개편
            - **`emoji-mart`** 도입으로 검색 + 한국어 + 카테고리 네비를 갖춘 풍부한 이모지 선택기를 제공합니다.
            - 이모지/색상 picker가 분리된 두 pill 버튼으로 토글되어 인터랙션이 명확해졌습니다.
            - **색상 팔레트 16색 파스텔 톤** (소프트 블루 · 라일락 · 민트 · 세이지 · 머스타드 · 라벤더 …) 으로 확장.
            - 뒤로가기 버튼 SVG 화살표 스타일로 통일.

            ### 🥔 상점
            - 모자 가격 조정: **40 · 55 · 70 새싹**.
            - 목도리 가격 조정: **80 · 100 · 120 새싹**.
            - 아이템 이름 변경: "멋쟁이 선글라스" → **"멋쟁이 하늘색 안경"**, "빨간 히어로 목도리" → **"어두운 밤하늘 목도리"**.

            ### 🪟 인스톨러 화질
            - NSIS 헤더/사이드바 BMP supersample을 4×→8× 으로 강화하여 작은 사이즈에서도 라인이 매끄럽게 보존됩니다.

            위 내용을 수정하였고 ${{ needs.prepare.outputs.suffix }}.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false

      # macOS: .dmg 파일명을 고정 이름으로 rename
      - name: Rename macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" Mohashim.dmg
            echo "Renamed: $DMG -> Mohashim.dmg"
          fi

      - name: Upload macOS dmg
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: .msi 파일명을 고정 이름으로 rename
      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination "Mohashim_Windows.msi"
            Write-Host "Renamed: $($msi.Name) -> Mohashim_Windows.msi"
          }

      - name: Upload Windows msi
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim_Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
