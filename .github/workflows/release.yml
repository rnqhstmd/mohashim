name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: rust-std 'universal-apple-darwin'은 단일 채널로 미배포
          # → aarch64 + x86_64 두 native target을 설치 후 lipo combine은 tauri-action이 처리
          - os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🎉 모하심 v1.0.0 — 첫 정식 릴리즈

            감자 캐릭터 모하와 함께하는 집중도 측정 + 포모도로 앱의 첫 정식 버전입니다.

            ### ✨ 주요 기능
            - 키보드·마우스 + 마이크 소음 하이브리드 집중도 측정 (0~100점)
            - 포모도로 타이머 + 28일 잔디 그래프
            - 감자 캐릭터 '모하' — 5단계 표정 반응
            - 새싹 경제 시스템 — 세션 완료/출석 보상, 상점에서 캐릭터 꾸미기
            - 편지함 — 세션 완료 편지, 출석 보상 편지
            - 월간 집중 인사이트 + 잔디 자랑하기 (PNG 합성)
            - 완전 로컬 저장 — 외부 서버 없음

            ### 📥 설치 방법
            - **macOS**: `Mohashim.dmg` 파일을 열어 Applications 폴더로 드래그하세요.
            - **Windows**: `Mohashim_Windows.msi` 파일을 실행하세요.

            > **macOS 첫 실행 시** "개발자를 확인할 수 없음" 경고가 뜨면
            > `시스템 설정 → 개인정보 보호 및 보안`에서 **그래도 열기**를 눌러주세요.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🎉 모하심 v1.0.0 — 첫 정식 릴리즈

            감자 캐릭터 모하와 함께하는 집중도 측정 + 포모도로 앱의 첫 정식 버전입니다.

            ### ✨ 주요 기능
            - 키보드·마우스 + 마이크 소음 하이브리드 집중도 측정 (0~100점)
            - 포모도로 타이머 + 28일 잔디 그래프
            - 감자 캐릭터 '모하' — 5단계 표정 반응
            - 새싹 경제 시스템 — 세션 완료/출석 보상, 상점에서 캐릭터 꾸미기
            - 편지함 — 세션 완료 편지, 출석 보상 편지
            - 월간 집중 인사이트 + 잔디 자랑하기 (PNG 합성)
            - 완전 로컬 저장 — 외부 서버 없음

            ### 📥 설치 방법
            - **macOS**: `Mohashim.dmg` 파일을 열어 Applications 폴더로 드래그하세요.
            - **Windows**: `Mohashim_Windows.msi` 파일을 실행하세요.

            > **macOS 첫 실행 시** "개발자를 확인할 수 없음" 경고가 뜨면
            > `시스템 설정 → 개인정보 보호 및 보안`에서 **그래도 열기**를 눌러주세요.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false

      # macOS: .dmg 파일명을 고정 이름으로 rename
      - name: Rename macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" Mohashim.dmg
            echo "Renamed: $DMG -> Mohashim.dmg"
          fi

      - name: Upload macOS dmg
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: .msi 파일명을 고정 이름으로 rename
      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target\x86_64-pc-windows-msvc\release\bundle\msi" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination "Mohashim_Windows.msi"
            Write-Host "Renamed: $($msi.Name) -> Mohashim_Windows.msi"
          }

      - name: Upload Windows msi
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim_Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
