name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare:
    # 릴리즈 body의 랜덤 후미 문구를 한 번만 뽑아 두 OS 잡에 공유.
    # 문구 목록은 아래 SUFFIXES 배열에서 자유롭게 추가/삭제.
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.pick.outputs.suffix }}
    steps:
      - name: Pick random release-body suffix
        id: pick
        shell: bash
        run: |
          SUFFIXES=(
            "오후 반차를 사용했습니다"
            "여자친구를 만나러가는 중입니다"
            "아아를 마셨습니다"
            "등갈비김치찜을 먹는 중입니다"
            "파스타를 만드는 중입니다"
          )
          IDX=$((RANDOM % ${#SUFFIXES[@]}))
          PICK="${SUFFIXES[$IDX]}"
          echo "suffix=$PICK" >> "$GITHUB_OUTPUT"
          echo "Picked: $PICK"

  release:
    needs: prepare
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: rust-std 'universal-apple-darwin'은 단일 채널로 미배포
          # → aarch64 + x86_64 두 native target을 설치 후 lipo combine은 tauri-action이 처리
          - os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🩹 모하심 v1.0.6 — 키보드 IME 충돌 핫픽스

            ### 🐛 수정 내역
            - **한국어 IME 동시 입력 회귀 차단**: 일부 환경에서 한·영키를 누르지 않았는데도 한글과 영어가 동시에 입력되거나, 한글 입력 도중 자모가 빠지는 회귀를 수정했습니다.
              - 원인: 이전 버전이 사용하던 `rdev` 라이브러리의 Windows 백엔드가 키 이벤트를 가로채는 과정에서 `ToUnicodeEx` / `GetKeyboardState` 시스템 호출을 발생시켜 IME 입력 큐를 망가뜨리던 부작용.
              - 조치: 입력 후킹 방식을 **OS 표준 polling API** (`GetLastInputInfo` / `CGEventSourceSecondsSinceLastEventType`) 로 교체. 시스템이 자체적으로 기록한 마지막 입력 시각을 1초 주기로 read-only 조회하여 사용자 입력 큐 / dead-key / sticky-key 등에 **무영향**.

            ### 🔧 기술 변경
            - `rdev = "0.5"` 의존성 제거, Windows-target `windows = "0.58"` 의존성 추가.
            - macOS 의존성은 기존 `core-foundation` 으로 충분 (CoreGraphics framework 직접 link).
            - 폴링 주기는 score tick과 동일한 **1초** — idle 표시 지연은 사용자 체감 없음.

            위 내용을 수정하였고 ${{ needs.prepare.outputs.suffix }}.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🩹 모하심 v1.0.6 — 키보드 IME 충돌 핫픽스

            ### 🐛 수정 내역
            - **한국어 IME 동시 입력 회귀 차단**: 일부 환경에서 한·영키를 누르지 않았는데도 한글과 영어가 동시에 입력되거나, 한글 입력 도중 자모가 빠지는 회귀를 수정했습니다.
              - 원인: 이전 버전이 사용하던 `rdev` 라이브러리의 Windows 백엔드가 키 이벤트를 가로채는 과정에서 `ToUnicodeEx` / `GetKeyboardState` 시스템 호출을 발생시켜 IME 입력 큐를 망가뜨리던 부작용.
              - 조치: 입력 후킹 방식을 **OS 표준 polling API** (`GetLastInputInfo` / `CGEventSourceSecondsSinceLastEventType`) 로 교체. 시스템이 자체적으로 기록한 마지막 입력 시각을 1초 주기로 read-only 조회하여 사용자 입력 큐 / dead-key / sticky-key 등에 **무영향**.

            ### 🔧 기술 변경
            - `rdev = "0.5"` 의존성 제거, Windows-target `windows = "0.58"` 의존성 추가.
            - macOS 의존성은 기존 `core-foundation` 으로 충분 (CoreGraphics framework 직접 link).
            - 폴링 주기는 score tick과 동일한 **1초** — idle 표시 지연은 사용자 체감 없음.

            위 내용을 수정하였고 ${{ needs.prepare.outputs.suffix }}.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false

      # macOS: .dmg 파일명을 고정 이름으로 rename
      - name: Rename macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" Mohashim.dmg
            echo "Renamed: $DMG -> Mohashim.dmg"
          fi

      - name: Upload macOS dmg
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: .msi 파일명을 고정 이름으로 rename
      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination "Mohashim_Windows.msi"
            Write-Host "Renamed: $($msi.Name) -> Mohashim_Windows.msi"
          }

      - name: Upload Windows msi
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim_Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
