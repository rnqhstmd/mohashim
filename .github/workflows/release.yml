name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: rust-std 'universal-apple-darwin'은 단일 채널로 미배포
          # → aarch64 + x86_64 두 native target을 설치 후 lipo combine은 tauri-action이 처리
          - os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 모하심 v1.0.2

            ### 🛠 변경
            - 설정 → 앱 업데이트 화면의 **릴리즈 노트가 마크다운 서식으로 렌더링**됩니다.
            - 설정 화면 하단과 업데이트 화면의 **버전 표기가 패키지 버전과 자동 동기화**됩니다.
            - README 다운로드 버튼이 GitHub Releases latest 페이지로 이동하도록 변경 — 페이지에서 자산을 직접 확인하고 받을 수 있습니다.

            ### 📥 설치 방법
            - **macOS**: `Mohashim.dmg` 파일을 열어 Applications 폴더로 드래그하세요.
            - **Windows**: `Mohashim_Windows.msi` 파일을 실행하세요.

            > **macOS 첫 실행 시** "개발자를 확인할 수 없음" 경고가 뜨면
            > `시스템 설정 → 개인정보 보호 및 보안`에서 **그래도 열기**를 눌러주세요.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## ✨ 모하심 v1.0.2

            ### 🛠 변경
            - 설정 → 앱 업데이트 화면의 **릴리즈 노트가 마크다운 서식으로 렌더링**됩니다.
            - 설정 화면 하단과 업데이트 화면의 **버전 표기가 패키지 버전과 자동 동기화**됩니다.
            - README 다운로드 버튼이 GitHub Releases latest 페이지로 이동하도록 변경 — 페이지에서 자산을 직접 확인하고 받을 수 있습니다.

            ### 📥 설치 방법
            - **macOS**: `Mohashim.dmg` 파일을 열어 Applications 폴더로 드래그하세요.
            - **Windows**: `Mohashim_Windows.msi` 파일을 실행하세요.

            > **macOS 첫 실행 시** "개발자를 확인할 수 없음" 경고가 뜨면
            > `시스템 설정 → 개인정보 보호 및 보안`에서 **그래도 열기**를 눌러주세요.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false

      # macOS: .dmg 파일명을 고정 이름으로 rename
      - name: Rename macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" Mohashim.dmg
            echo "Renamed: $DMG -> Mohashim.dmg"
          fi

      - name: Upload macOS dmg
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: .msi 파일명을 고정 이름으로 rename
      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination "Mohashim_Windows.msi"
            Write-Host "Renamed: $($msi.Name) -> Mohashim_Windows.msi"
          }

      - name: Upload Windows msi
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim_Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
