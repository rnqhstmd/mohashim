name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare:
    # 릴리즈 body의 랜덤 후미 문구를 한 번만 뽑아 두 OS 잡에 공유.
    # 문구 목록은 아래 SUFFIXES 배열에서 자유롭게 추가/삭제.
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.pick.outputs.suffix }}
    steps:
      - name: Pick random release-body suffix
        id: pick
        shell: bash
        run: |
          SUFFIXES=(
            "오후 반차를 사용했습니다"
            "여자친구를 만나러가는 중입니다"
            "아아를 마셨습니다"
            "등갈비김치찜을 먹는 중입니다"
            "파스타를 만드는 중입니다"
          )
          IDX=$((RANDOM % ${#SUFFIXES[@]}))
          PICK="${SUFFIXES[$IDX]}"
          echo "suffix=$PICK" >> "$GITHUB_OUTPUT"
          echo "Picked: $PICK"

  release:
    needs: prepare
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: rust-std 'universal-apple-darwin'은 단일 채널로 미배포
          # → aarch64 + x86_64 두 native target을 설치 후 lipo combine은 tauri-action이 처리
          - os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🩹 모하심 v1.0.4 — 핫픽스

            ### 🛠 변경 내역
            - 설정 → 앱 업데이트 화면의 "다운로드" 버튼 라벨을 **"다운로드 링크"로 변경**. 클릭하면 GitHub Releases 페이지가 외부 브라우저에서 열립니다 (자동 다운로드/설치는 아직 미지원).
            - 업데이트 화면 하단의 "다운로드 후 설치 프로그램을 실행해주세요…" 안내 문구 제거.
            - 위 내용을 수정하였고 ${{ needs.prepare.outputs.suffix }}.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🩹 모하심 v1.0.4 — 핫픽스

            ### 🛠 변경 내역
            - 설정 → 앱 업데이트 화면의 "다운로드" 버튼 라벨을 **"다운로드 링크"로 변경**. 클릭하면 GitHub Releases 페이지가 외부 브라우저에서 열립니다 (자동 다운로드/설치는 아직 미지원).
            - 업데이트 화면 하단의 "다운로드 후 설치 프로그램을 실행해주세요…" 안내 문구 제거.
            - 위 내용을 수정하였고 ${{ needs.prepare.outputs.suffix }}.

            ### 🔍 전체 변경사항
            [CHANGELOG.md](https://github.com/rnqhstmd/mohashim/blob/main/CHANGELOG.md)에서 확인하세요.
          releaseDraft: false
          prerelease: false

      # macOS: .dmg 파일명을 고정 이름으로 rename
      - name: Rename macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" Mohashim.dmg
            echo "Renamed: $DMG -> Mohashim.dmg"
          fi

      - name: Upload macOS dmg
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: .msi 파일명을 고정 이름으로 rename
      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination "Mohashim_Windows.msi"
            Write-Host "Renamed: $($msi.Name) -> Mohashim_Windows.msi"
          }

      - name: Upload Windows msi
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim_Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
