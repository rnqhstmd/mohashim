name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  prepare:
    # 릴리즈 body의 랜덤 후미 문구를 한 번만 뽑아 두 OS 잡에 공유.
    # 문구 목록은 아래 SUFFIXES 배열에서 자유롭게 추가/삭제.
    runs-on: ubuntu-latest
    outputs:
      suffix: ${{ steps.pick.outputs.suffix }}
    steps:
      - name: Pick random release-body suffix
        id: pick
        shell: bash
        run: |
          SUFFIXES=(
            "오후 반차를 사용했습니다"
            "여자친구를 만나러가는 중입니다"
            "아아를 마셨습니다"
            "등갈비김치찜을 먹는 중입니다"
            "파스타를 만드는 중입니다"
          )
          IDX=$((RANDOM % ${#SUFFIXES[@]}))
          PICK="${SUFFIXES[$IDX]}"
          echo "suffix=$PICK" >> "$GITHUB_OUTPUT"
          echo "Picked: $PICK"

  release:
    needs: prepare
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS: rust-std 'universal-apple-darwin'은 단일 채널로 미배포
          # → aarch64 + x86_64 두 native target을 설치 후 lipo combine은 tauri-action이 처리
          - os: macos-latest
            target: aarch64-apple-darwin,x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Build and release (macOS)
        if: matrix.os == 'macos-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🩹 모하심 v1.0.6

            - 한·영을 안 눌렀는데 한글과 영어가 동시에 입력되던 문제를 수정했어요.
            - 키보드 입력 감지 방식을 더 안정적인 OS 표준 방식으로 바꿨어요.

            ${{ needs.prepare.outputs.suffix }}.
          releaseDraft: false
          prerelease: false
          args: --target universal-apple-darwin

      - name: Build and release (Windows)
        if: matrix.os == 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '모하심 ${{ github.ref_name }}'
          releaseBody: |
            ## 🩹 모하심 v1.0.6

            - 한·영을 안 눌렀는데 한글과 영어가 동시에 입력되던 문제를 수정했어요.
            - 키보드 입력 감지 방식을 더 안정적인 OS 표준 방식으로 바꿨어요.

            ${{ needs.prepare.outputs.suffix }}.
          releaseDraft: false
          prerelease: false

      # macOS: .dmg 파일명을 고정 이름으로 rename
      - name: Rename macOS artifact
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -n "$DMG" ]; then
            cp "$DMG" Mohashim.dmg
            echo "Renamed: $DMG -> Mohashim.dmg"
          fi

      - name: Upload macOS dmg
        if: matrix.os == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Windows: .msi 파일명을 고정 이름으로 rename
      - name: Rename Windows artifact
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $msi = Get-ChildItem -Path "src-tauri\target\release\bundle\msi" -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination "Mohashim_Windows.msi"
            Write-Host "Renamed: $($msi.Name) -> Mohashim_Windows.msi"
          }

      - name: Upload Windows msi
        if: matrix.os == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: Mohashim_Windows.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
